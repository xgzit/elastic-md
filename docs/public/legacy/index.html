<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>单页阅读模式</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-layer"></div>
    <div id="readProgress" class="read-progress"></div>
    <header class="topbar">
      <button id="menuBtn" class="menu-btn" aria-label="切换目录">目录</button>
      <div class="brand">
        <p class="brand-kicker">Single Page Reading</p>
        <h1>单页阅读模式</h1>
      </div>
      <div class="meta">
        <a id="docsLink" href="/" target="_blank" rel="noopener noreferrer">回到文档站</a>
        <a id="videoLink" href="#" target="_blank" rel="noopener noreferrer">B站视频</a>
        <a id="sourceLink" href="#" target="_blank" rel="noopener noreferrer">原文链接</a>
        <a
          id="githubLink"
          class="icon-link"
          href="https://github.com/xgzit/elastic-md"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub 仓库"
          title="GitHub 仓库"
        >
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 0C3.58 0 0 3.67 0 8.2c0 3.63 2.29 6.7 5.47 7.78.4.08.55-.18.55-.39 0-.19-.01-.82-.01-1.49-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.98-.82-1.17-.28-.16-.68-.56-.01-.57.63-.01 1.08.6 1.23.85.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.09-1.78-.21-3.64-.92-3.64-4.08 0-.9.31-1.64.82-2.22-.08-.21-.36-1.05.08-2.19 0 0 .67-.22 2.2.85A7.36 7.36 0 0 1 8 4.9c.68 0 1.37.1 2.01.29 1.53-1.07 2.2-.85 2.2-.85.44 1.14.16 1.98.08 2.19.51.58.82 1.31.82 2.22 0 3.17-1.87 3.87-3.65 4.08.29.26.54.75.54 1.52 0 1.1-.01 1.99-.01 2.26 0 .22.14.48.55.39A8.28 8.28 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
            />
          </svg>
        </a>
      </div>
    </header>

    <div class="layout">
      <aside id="sidebar" class="sidebar">
        <div class="search-wrap">
          <p class="panel-title">页面导览</p>
          <input id="searchInput" type="search" placeholder="搜索章节与正文关键词" />
          <div class="search-tools">
            <span id="searchStat">0 / 0</span>
            <div class="search-actions">
              <button id="searchPrev" type="button">上一个</button>
              <button id="searchNext" type="button">下一个</button>
            </div>
          </div>
        </div>
        <nav id="sidebarNav" class="sidebar-nav"></nav>
      </aside>

      <main class="main">
        <article id="docContent" class="doc-content"></article>
      </main>

      <aside class="right-rail">
        <h2 id="rightRailTitle">当前章节</h2>
        <nav id="rightToc" class="right-toc"></nav>
      </aside>
    </div>

    <button id="backTopBtn" class="back-top-btn" type="button" aria-label="回到顶部">↑</button>

    <aside id="imgErrorPanel" class="img-error-panel" aria-live="polite">
      <button id="imgErrorToggle" class="img-error-toggle" type="button" aria-expanded="false">
        图片异常 0
      </button>
      <div id="imgErrorBody" class="img-error-body">
        <p>暂无异常</p>
        <ul id="imgErrorList"></ul>
      </div>
    </aside>

    <div id="imgLightbox" class="img-lightbox" aria-hidden="true">
      <button id="lightboxClose" class="lightbox-close" type="button" aria-label="关闭">×</button>
      <img id="lightboxImage" alt="放大预览" />
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
